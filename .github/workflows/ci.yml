name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run test suite (includes the Phase 0 go/no-go gate)
        run: python -m pytest -q
      - name: Validate PTP credential fixtures against the frozen v0.1 schema
        run: |
          python -m preferencelayer.ptp.schema_validate tests/fixtures/credential_valid.json
          # The invalid fixture MUST be rejected (exit 1); invert so CI passes only on rejection.
          if python -m preferencelayer.ptp.schema_validate tests/fixtures/credential_invalid.json; then
            echo "ERROR: invalid credential fixture was accepted by the validator" >&2
            exit 1
          fi
